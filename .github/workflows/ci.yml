name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The runner's python3 is Homebrew-managed (PEP 668) and refuses bare
      # pip installs, so use a venv — same as the documented server setup.
      - name: Install server dependencies
        run: |
          python3 -m venv .ci-venv
          .ci-venv/bin/python -m pip install -r server/requirements.txt

      - name: Python compile
        run: .ci-venv/bin/python -m compileall -q server/*.py server/cleanup server/engines server/tests scripts gen_xcodeproj.py

      - name: Python tests
        run: .ci-venv/bin/python -m unittest discover server/tests

      - name: Swift tests
        run: swift test

      - name: iOS build
        run: xcodebuild -project Whisker.xcodeproj -scheme Whisker -destination 'generic/platform=iOS' build CODE_SIGNING_ALLOWED=NO

      - name: Private reference guard
        run: |
          command -v rg >/dev/null 2>&1 || brew install ripgrep
          bash scripts/private_reference_scan.sh
